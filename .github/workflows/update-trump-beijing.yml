name: Update Trump Beijing Feed

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build latest Trump Beijing data
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-4.1-mini
        run: npm run update:trump-beijing

      - name: Commit data changes
        run: |
          if [[ -n "$(git status --porcelain data/trump-beijing.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/trump-beijing.json
            git commit -m "chore: update trump beijing feed data"
            git push
          else
            echo "No data changes"
          fi
